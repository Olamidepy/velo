name: node-ci
on:
  push:
    paths-ignore: ["contracts/**"]
  pull_request:
    paths-ignore: ["contracts/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run test --if-present
      - run: npm run lint --if-present
